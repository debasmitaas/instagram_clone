name: instagram_clone
description: "Flutter Instagram Clone Assignment"
publish_to: 'none'  
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  dio: ^5.9.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^8.0.2 
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android:true
  ios:true
  image_path:"assets/images/ing_logo.png"
flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  fonts:
    - family: Segoe UI
      fonts:
        - asset: fonts/Segoe-UI-Bold.ttf
        - asset: fonts/Segoe-UI.ttf
    - family: Billabong
      fonts:
        - asset: fonts/Billabong.ttf
  
